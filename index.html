<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Darling 💌</title>
<style>
body {
margin: 0;
background: #fff0f5;
font-family: Arial, sans-serif;
overflow: hidden;
text-align: center;
}

/* Link button */
.link-btn {
margin-top: 100px;
padding: 15px 25px;
font-size: 18px;
background: #ff4d6d;
color: white;
border: none;
border-radius: 10px;
cursor: pointer;
}

/* Envelope */
.envelope {
width: 200px;
height: 120px;
background: #ffccd5;
margin: 100px auto;
position: relative;
cursor: pointer;
display: none;
}

.flap {
width: 0;
height: 0;
border-left: 100px solid transparent;
border-right: 100px solid transparent;
border-bottom: 60px solid #ff4d6d;
position: absolute;
top: -60px;
left: 0;
transition: transform 0.5s;
transform-origin: bottom;
}

.open .flap {
transform: rotateX(180deg);
}

/* Message */
.message {
display: none;
font-size: 32px;
color: #d1003f;
margin-top: 50px;
}

/* Hearts */
.heart {
position: absolute;
color: red;
font-size: 20px;
animation: float 5s linear infinite;
}

@keyframes float {
0% {
transform: translateY(100vh);
opacity: 1;
}
100% {
transform: translateY(-10vh);
opacity: 0;
}
}
</style>
</head>

<body>

<button class="link-btn" onclick="showEnvelope()">Click Me 💌</button>

<div class="envelope" id="envelope" onclick="openEnvelope()">
<div class="flap"></div>
</div>

<div class="message" id="message">Sorry Darling ❤️</div>

<script>
function showEnvelope() {
document.querySelector('.link-btn').style.display = 'none';
document.getElementById('envelope').style.display = 'block';
}

function openEnvelope() {
const env = document.getElementById('envelope');
env.classList.add('open');

setTimeout(() => {
env.style.display = 'none';
document.getElementById('message').style.display = 'block';
createHearts();
}, 600);
}

function createHearts() {
setInterval(() => {
const heart = document.createElement('div');
heart.classList.add('heart');
heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";
heart.style.fontSize = (15 + Math.random() * 20) + "px";

document.body.appendChild(heart);

setTimeout(() => {
heart.remove();
}, 5000);
}, 200);
}
</script>

</body>
</html>
